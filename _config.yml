title: 微处理器研究中心（MTRC）
description: >-
  中国科学院计算技术研究所微处理器研究中心（MTRC）主页。
  站点展示中心概况、研究方向、团队成员、开放项目与联系信息。
email: jw@ict.ac.cn
baseurl: ""
url: ""
timezone: Asia/Shanghai

collections:
  people:
    output: true
  research:
    output: true
  news:
    output: true
  articles:
    output: true

defaults:
  - scope:
      path: ""
      type: "people"
    values:
      nav_key: "team"
  - scope:
      path: ""
      type: "research"
    values:
      nav_key: "research"
  - scope:
      path: ""
      type: "news"
    values:
      nav_key: "updates"
  - scope:
      path: ""
      type: "articles"
    values:
      nav_key: "updates"

markdown: kramdown
plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .bundle
  - .github
  - .gitignore
  - node_modules
  - vendor
  - .jekyll-cache
  - .sass-cache
