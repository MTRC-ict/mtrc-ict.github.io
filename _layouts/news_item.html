---
layout: default
---

<section class="page-hero">
  <div class="container page-hero-inner card">
    <p class="eyebrow">{{ page.eyebrow | default: "News" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p>{{ page.summary }}</p>
    {% endif %}
    <a class="back-link" href="{{ '/news/' | relative_url }}">← 返回新闻列表</a>
  </div>
</section>

<section class="section">
  <div class="container content-stack">
    <article class="card">
      <dl class="meta-list">
        <div>
          <dt>日期</dt>
          <dd>{{ page.date | date: "%Y-%m-%d" }}</dd>
        </div>
        {% if page.category %}
          <div>
            <dt>分类</dt>
            <dd>{{ page.category }}</dd>
          </div>
        {% endif %}
      </dl>
    </article>

    <article class="card rich-content profile-section">
      {{ content }}
    </article>
  </div>
</section>
