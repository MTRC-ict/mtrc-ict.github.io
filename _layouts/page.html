---
layout: default
---

<section class="page-hero">
  <div class="container page-hero-inner card">
    <p class="eyebrow">{{ page.eyebrow | default: "Page" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
      <p>{{ page.intro }}</p>
    {% endif %}
    <a class="back-link" href="{{ '/' | relative_url }}">← 返回首页</a>
  </div>
</section>

<section class="section">
  <div class="container content-stack">
    {{ content }}
  </div>
</section>
